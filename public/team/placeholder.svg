<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="placeholderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#placeholderGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.2"/>
  
  <!-- Center icon area -->
  <g transform="translate(200, 140)">
    <!-- Camera/Photo icon -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#4ade80" opacity="0.8">
    To Be Updated Soon
  </text>
  
  <!-- Subtle animation indicator -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#999" opacity="0.6">
    Coming Soon
  </text>
</svg>